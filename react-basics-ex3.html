<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
     
function ProductDetails({product, price, discount}){
  return(

    <> 
    {product == "Tennis balls" ? (
      <img src="tennisballs.png" width="50"></img>
      ) : (
     <img src="tshirt.png" width="50"></img>   
      )
    }
    
      <p> {product}</p>
        
      {discount == "10" ? (
        <div>
          <del><p> Price: {price}$ </p></del>
          <p> Discount Price: {Number(price)*0.9}$</p>
        </div>
      ) : (
        <div>
          <p> Price: {price}$ </p>
        </div>
      ) 
    }
    </>
  )
 
}

  function App(){
    return (
    <>
    <ProductDetails 
      product="Tennis balls" 
      price="6"
      discount="10">
    </ProductDetails>

    <ProductDetails
      product="T-shirt"
      price="7.99">
    </ProductDetails>
    </>
    );
  }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
