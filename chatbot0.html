<!DOCTYPE html>
<html>

<head>
  <title>Chatbot</title>
</head>

<body>
  <div class="js-container"></div>

  <script src="https://unpkg.com/supersimpledev/react.js"></script>
  <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

  <script src="https://unpkg.com/supersimpledev/babel.js"></script>
  <script type="text/babel">

    function ChatInput() {
      return (
        <>
          <input 
            placeholder="Send a message here" 
            size="30">
          </input>
          <button>Send</button>
        </>
      );
    }

    function ChatMessage({message, sender}) { // even shorter-version
      //const message = props.message; // long-version
      //const sender = props.sender 
      //const {message, sender} = // props short-version 

      /*if (sender == "user") {
        return (
          <div>
            <img src="user.png" width="50"></img>
            {message}
          </div>
        );
        }*/
    
      
      return (
          <div>
            {sender == "user" && (
              <img src="user.png" width="50"></img>
            )}

            {message}

            {sender == "robot" && (
              <img src="robot.png" width="50"></img>
            )}
          </div>
        );
      }

      function App(){

        return(
          <>
            <ChatInput></ChatInput>
            
            <ChatMessage 
              message="hello" 
              sender="user">
            </ChatMessage>

            <ChatMessage 
              message="olleh" 
              sender="robot">
            </ChatMessage>

            <ChatMessage 
              message="bye" 
              sender="user">
            </ChatMessage>

            <ChatMessage 
              message="eyb" 
              sender="robot">
            </ChatMessage>
          </>
        )
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
  </script>
</body>

</html>
